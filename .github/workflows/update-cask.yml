name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update mount-manager.rb
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/mount-manager.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/mount-manager.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/mount-manager.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update mount-manager to v${{ github.event.client_payload.version }}"
          git push
